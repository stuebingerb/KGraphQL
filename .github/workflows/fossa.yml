name: FOSSA Scan

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**/*'

permissions:
  contents: read

jobs:
  fossa-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run FOSSA Scan
        uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3 # v1
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
