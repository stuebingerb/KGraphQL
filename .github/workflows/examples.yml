name: Tests (Examples)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ktor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
      - name: Run Tests
        run: ./gradlew check
        working-directory: ./examples/ktor
