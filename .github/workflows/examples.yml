name: Tests (Examples)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ktor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Run Tests
        run: ./gradlew check
        working-directory: ./examples/ktor
