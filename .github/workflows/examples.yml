name: Tests (Examples)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ktor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Run Tests
        run: ./gradlew check
        working-directory: ./examples/ktor
