name: Benchmarks Cleanup (Pull Request)

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read

jobs:
  archive_pr_branch:
    name: Archive closed PR branch
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: bencherdev/bencher@d2895af8c867c83b8fe766a6b84d8ccd4df5c315 # v0.6.10
      - name: Archive closed PR branch with Bencher
        run: |
          bencher archive \
          --project d1158d5b-df59-4769-9ff0-8b2fd3d648b0 \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch "$GITHUB_HEAD_REF"
