name: Benchmarks (Pull Request)

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  checks: write
  pull-requests: write

jobs:
  benchmark_pr_branch:
    name: Bencher (Pull Request)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Run benchmarks
        id: run
        run: |
          ./gradlew benchmark
          echo "result_file=$(find . -type f -name 'jvm.json')" >> $GITHUB_OUTPUT
      - uses: bencherdev/bencher@d2895af8c867c83b8fe766a6b84d8ccd4df5c315 # v0.6.10
      - name: Track benchmark result with Bencher
        run: |
          bencher run \
          --project d1158d5b-df59-4769-9ff0-8b2fd3d648b0 \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch "$GITHUB_HEAD_REF" \
          --start-point "$GITHUB_BASE_REF" \
          --start-point-hash '${{ github.event.pull_request.base.sha }}' \
          --start-point-clone-thresholds \
          --start-point-reset \
          --testbed ubuntu-latest \
          --err \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          --adapter java_jmh --file ${{ steps.run.outputs.result_file }}
