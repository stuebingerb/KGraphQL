services:
  docs:
    image: python:3.14.5-alpine3.22@sha256:4bd90d05a1f28798edc10fe3daf9ea763ee53fb9f6017ddf84e23d0034d64cf8
    entrypoint: [ ]
    command: sh -c "cd docs && pip install -r requirements.txt && mkdocs serve --dev-addr=0.0.0.0:8000"
    volumes:
      - .:/docs
    ports:
      - 8000:8000
